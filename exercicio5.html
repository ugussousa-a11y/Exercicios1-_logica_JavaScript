<!DOCTYPE html>

</head>
<body>
    
    <h1> Criando algoritimo que calcula quantos salarios minimos uma pessoa ganha</h1>

    <script>

        let salariousuario = parseFloat(prompt("Digite o valor do salário do usuário:"));        
        let salariominimo = parseFloat(prompt("Digite o valor do salário mínimo:"));
        

        let quantidade = salariousuario/ salariominimo;

        document.write(`O usuário ganha ${quantidade.toFixed(2)} salários mínimos.`);


    </script>
</body>
</html>
