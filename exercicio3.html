<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Exercício 3</title>
</head>
<body>
    
    <h1> 3 Informar um saldo e imprimir o saldo com reajuste de 1%.</h1>

    <script>

        let saldo = parseFloat(prompt("Digite o saldo: "))

        if (isNaN(saldo)) {
            alert("Erro: você deve digitar um número válido para o saldo.")
        } else {
            let saldoReajustado = saldo * 1.01
            alert(`O saldo com reajuste de 1% é: ${saldoReajustado.toFixed(2)}`)
            document.write(`O saldo com reajuste de 1% é: ${saldoReajustado.toFixed(2)}`)
        }


        </script>


</body>
</html>
